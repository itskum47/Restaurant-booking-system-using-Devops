apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: restaurant-system
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: booking-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."; sleep 3;
              done
              echo "postgres is ready"
      containers:
        - name: flyway
          image: flyway/flyway:10-alpine
          args: [migrate, -outOfOrder=false, -validateOnMigrate=true]
          env:
            - name: FLYWAY_URL
              value: jdbc:postgresql://postgres:5432/restaurant_booking
            - name: FLYWAY_USER
              value: admin
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: restaurant-secrets
                  key: POSTGRES_PASSWORD
            - name: FLYWAY_LOCATIONS
              value: filesystem:/flyway/sql
            - name: FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
          volumeMounts:
            - name: migrations
              mountPath: /flyway/sql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: migrations
          configMap:
            name: db-migrations

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: restaurant-system
resources:
  # Namespace
  - namespace.yaml
  # Databases
  - databases/postgres-statefulset.yaml
  - databases/mongodb-statefulset.yaml
  - databases/redis-deployment.yaml
  - databases/pgbouncer.yaml
  - databases/flyway-job.yaml
  # Services
  - services/booking-service-deployment.yaml
  - services/ai-service-deployment.yaml
  # Monitoring
  - monitoring/prometheus-configmap.yaml
  - monitoring/prometheus-deployment.yaml
  # Security
  - security/network-policies.yaml
  - security/pod-disruption-budgets.yaml
  # Autoscaling
  - autoscaling/hpa.yaml
commonLabels:
  managed-by: kustomize
  project: restaurant-booking-system

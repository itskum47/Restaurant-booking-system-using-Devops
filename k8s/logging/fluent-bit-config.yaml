# Fluent Bit ConfigMap — forwards all pod logs to Elasticsearch
# Install via: helm install fluent-bit fluent/fluent-bit -n logging -f <this-file>
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush           5
        Daemon          Off
        Log_Level       info
        Parsers_File    parsers.conf

    # Tail all pod logs from the restaurant-system namespace
    [INPUT]
        Name              tail
        Path              /var/log/containers/*restaurant-system*.log
        Parser            docker
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

    # Enrich logs with Kubernetes metadata
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        Annotations         Off
        Labels              On

    # Redact sensitive fields before shipping
    [FILTER]
        Name    modify
        Match   kube.*
        Remove  password
        Remove  authorization
        Remove  x-api-key
        Remove  token
        Remove  credit_card

    # Parse JSON body where possible
    [FILTER]
        Name    parser
        Match   kube.*
        Parser  json
        Key_Name log
        Reserve_Data On

    # Forward to Elasticsearch
    [OUTPUT]
        Name            es
        Match           kube.*
        Host            elasticsearch.logging.svc.cluster.local
        Port            9200
        Logstash_Format On
        Logstash_Prefix restaurant-booking
        Retry_Limit     5
        Replace_Dots    On
        Trace_Error     On
        Generate_ID     On
        # TLS (enable in production)
        TLS             Off

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        json
        Format      json
        Time_Key    timestamp
        Time_Format %Y-%m-%dT%H:%M:%S

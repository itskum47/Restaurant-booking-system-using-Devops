# Template for Kubernetes Secrets — DO NOT COMMIT WITH REAL VALUES
# Use ExternalSecrets (see k8s/external-secrets/) to inject these at deploy time.
# This file is for reference only — fill it locally and never push to git.
#
# How to create from this template:
#   1. Copy this file: cp k8s/secrets/secrets-template.yaml /tmp/restaurant-secrets.yaml
#   2. Fill in real values (base64-encoded)
#   3. Apply: kubectl apply -f /tmp/restaurant-secrets.yaml
#   4. Delete the local copy: rm /tmp/restaurant-secrets.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: restaurant-secrets
  namespace: restaurant-system
  annotations:
    managed-by: "ExternalSecrets"
type: Opaque
data:
  # echo -n "REPLACE_ME" | base64
  JWT_SECRET: <BASE64_REPLACE_ME>
  POSTGRES_PASSWORD: <BASE64_REPLACE_ME>
  MONGO_PASSWORD: <BASE64_REPLACE_ME>
  REDIS_PASSWORD: <BASE64_REPLACE_ME>
  GEMINI_API_KEY: <BASE64_REPLACE_ME>
  GROQ_API_KEY: <BASE64_REPLACE_ME>
  STRIPE_SECRET_KEY: <BASE64_REPLACE_ME>

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: restaurant-secret-store
  namespace: restaurant-system
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-secret
            key: access-key
          secretAccessKeySecretRef:
            name: aws-secret
            key: secret-access-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: restaurant-secrets
  namespace: restaurant-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: restaurant-secret-store
    kind: SecretStore
  target:
    name: restaurant-secrets
    creationPolicy: Owner
  data:
  - secretKey: DATABASE_URL
    remoteRef:
      key: restaurant/prod/database
      property: url
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: restaurant/prod/database
      property: password

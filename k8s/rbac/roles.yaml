# Roles — minimal RBAC permissions per service
# Each role grants only the verbs each service actually needs.
# ─────────────────────────────────────────────────────────────────────────────

# api-gateway: reads ConfigMaps (config) and Secrets (JWT secret)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-gateway-role
  namespace: restaurant-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["restaurant-jwt-secret"]
  verbs: ["get"]
---
# ai-service: reads ConfigMaps and its AI-key secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-service-role
  namespace: restaurant-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["restaurant-ai-keys"]
  verbs: ["get"]
---
# booking-service: reads ConfigMaps + DB secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: booking-service-role
  namespace: restaurant-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["restaurant-postgres-secret", "restaurant-redis-secret", "restaurant-jwt-secret"]
  verbs: ["get"]
---
# restaurant-service: reads ConfigMaps + Mongo secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: restaurant-service-role
  namespace: restaurant-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["restaurant-mongo-secret", "restaurant-jwt-secret"]
  verbs: ["get"]
---
# notification-service: reads ConfigMaps + Stripe secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notification-service-role
  namespace: restaurant-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["restaurant-stripe-secret", "restaurant-jwt-secret"]
  verbs: ["get"]
---
# frontend: no K8s API access needed
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frontend-role
  namespace: restaurant-system
rules: []

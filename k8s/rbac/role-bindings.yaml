# RoleBindings — bind each Role to its ServiceAccount
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-binding
  namespace: restaurant-system
subjects:
- kind: ServiceAccount
  name: api-gateway-sa
  namespace: restaurant-system
roleRef:
  kind: Role
  name: api-gateway-role
  apiGroup: rbac.authorization.k8s.io
---

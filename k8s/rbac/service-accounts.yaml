# ServiceAccounts — one per microservice (principle of least privilege)
# Each service gets its own identity; no service shares a ServiceAccount.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: restaurant-system
  labels:
    app: api-gateway
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-service-sa
  namespace: restaurant-system
  labels:
    app: ai-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: booking-service-sa
  namespace: restaurant-system
  labels:
    app: booking-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restaurant-service-sa
  namespace: restaurant-system
  labels:
    app: restaurant-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service-sa
  namespace: restaurant-system
  labels:
    app: notification-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: restaurant-system
  labels:
    app: frontend

# External Secrets Operator — Deployment
# Installs ESO via Helm in the external-secrets namespace.
# Apply with: helm install external-secrets external-secrets/external-secrets \
#               -n external-secrets --create-namespace
#
# This file documents the Helm values we use.
# See cluster-secret-store.yaml for the SecretStore and external-secrets.yaml for mappings.
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    app.kubernetes.io/managed-by: Helm

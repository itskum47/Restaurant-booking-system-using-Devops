# ClusterSecretStore — AWS Secrets Manager backend
# Supports both AWS Secrets Manager (recommended) and HashiCorp Vault (alternative).
# Uncomment the relevant section.
# ─────────────────────────────────────────────────────────────────────────────
# OPTION A: AWS Secrets Manager (EKS with IRSA)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    description: "AWS Secrets Manager backend for restaurant-booking-system"
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1              # TODO: change to your AWS region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# ─────────────────────────────────────────────────────────────────────────────

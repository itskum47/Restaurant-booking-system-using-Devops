# ExternalSecrets — maps AWS Secrets Manager paths to Kubernetes Secrets
# Requires: ClusterSecretStore "aws-secrets-manager" to be created first.
# ─────────────────────────────────────────────────────────────────────────────

# ── JWT & Auth ───────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-secret
  namespace: restaurant-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: restaurant-jwt-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: restaurant-booking/jwt-secret    # AWS Secrets Manager path
        property: value                       # key inside the JSON secret
---
# ── PostgreSQL ───────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: restaurant-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: restaurant-postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: restaurant-booking/postgres
        property: password
    - secretKey: POSTGRES_USER
      remoteRef:
        key: restaurant-booking/postgres
        property: username
---

apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: restaurant-system
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: postgres-backup
            image: postgres:12
            command:
            - /bin/sh
            - -c
            - pg_dump -h postgres -U admin restaurant_db | gzip > /tmp/backup.sql.gz
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: restaurant-secrets
                  key: DATABASE_PASSWORD
          restartPolicy: OnFailure

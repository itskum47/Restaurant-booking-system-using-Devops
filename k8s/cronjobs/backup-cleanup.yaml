apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-cleanup
  namespace: restaurant-system
  labels:
    app: backup-cleanup
spec:
  schedule: "0 3 * * 0"   # Weekly at 03:00 UTC Sunday
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: cleanup
              image: amazon/aws-cli:2.15.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  CUTOFF=$(date -d '30 days ago' +%Y%m%d 2>/dev/null || \
                            date -v-30d +%Y%m%d 2>/dev/null)
                  echo "Deleting backups older than: $CUTOFF"
                  DELETED=0

                  # Postgres backups
                  for f in $(aws s3 ls "s3://${BACKUP_S3_BUCKET}/postgres/" \
                               --recursive | awk '{print $4}'); do
                    FDATE=$(echo "$f" | grep -oE '[0-9]{8}' | head -1)
                    if [ -n "$FDATE" ] && [ "$FDATE" -lt "$CUTOFF" ]; then
                      aws s3 rm "s3://${BACKUP_S3_BUCKET}/${f}"
                      echo "Deleted: $f"
                      DELETED=$((DELETED+1))
                    fi
                  done

                  # MongoDB backups
                  for f in $(aws s3 ls "s3://${BACKUP_S3_BUCKET}/mongodb/" \
                               --recursive | awk '{print $4}'); do
                    FDATE=$(echo "$f" | grep -oE '[0-9]{8}' | head -1)
                    if [ -n "$FDATE" ] && [ "$FDATE" -lt "$CUTOFF" ]; then
                      aws s3 rm "s3://${BACKUP_S3_BUCKET}/${f}"
                      echo "Deleted: $f"
                      DELETED=$((DELETED+1))
                    fi
                  done

                  echo "Cleanup complete. Total deleted: $DELETED"
              env:
                - name: BACKUP_S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: restaurant-secrets
                      key: BACKUP_S3_BUCKET
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: restaurant-secrets
                      key: AWS_REGION
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: restaurant-secrets
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: restaurant-secrets
                      key: AWS_SECRET_ACCESS_KEY
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi

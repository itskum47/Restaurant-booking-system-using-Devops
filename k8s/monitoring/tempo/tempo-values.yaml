tempo:
  replicationFactor: 1
  reportingEnabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/wal
    wal:
      path: /var/tempo/wal

ingester:
  max_block_bytes: 1073741824      # 1 GiB
  max_block_duration: 5m

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

querier:
  frontend_worker:
    frontend_address: tempo-query-frontend:9095

compactor:
  compaction:
    block_retention: 336h            # 14 days

metricsGenerator:
  enabled: true
  config:
    storage:
      path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write

serviceMonitor:
  enabled: true
  interval: 30s

apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: restaurant-booking-alerts
  namespace: monitoring
  labels:
    alertmanagerConfig: restaurant-booking
spec:
  route:
    groupBy: [alertname, service, namespace]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    receiver: slack-warning
    routes:
      - matchers:
          - name: severity
            value: critical
        receiver: pagerduty-critical
        groupWait: 10s
        repeatInterval: 1h
        continue: true
      - matchers:
          - name: severity
            value: critical
        receiver: slack-critical
        groupWait: 10s
        repeatInterval: 1h
      - matchers:
          - name: severity
            value: warning
        receiver: slack-warning
        repeatInterval: 4h

  receivers:
    - name: slack-critical
      slackConfigs:
        - apiURL:
            name: alertmanager-secrets
            key: SLACK_WEBHOOK_URL
          channel: "#alerts-critical"
          sendResolved: true
          title: |-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          text: |-
            {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Severity:* {{ .Labels.severity }}
            *Service:* {{ .Labels.service }}
            *Description:* {{ .Annotations.description }}
            *Runbook:* {{ .Annotations.runbook_url }}
            *Started:* {{ .StartsAt | since }}
            {{ end }}
          color: |-
            {{ if eq .Status "firing" }}danger{{ else }}good{{ end }}

    - name: slack-warning
      slackConfigs:
        - apiURL:
            name: alertmanager-secrets
            key: SLACK_WEBHOOK_URL
          channel: "#alerts-warning"
          sendResolved: true
          title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
          text: |-
            {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }} — {{ .Labels.service }}
            {{ end }}

    - name: pagerduty-critical
      pagerdutyConfigs:
        - routingKey:
            name: alertmanager-secrets
            key: PAGERDUTY_ROUTING_KEY
          description: "{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}"
          severity: critical
          details:
            - key: runbook
              value: "{{ .CommonAnnotations.runbook_url }}"
            - key: namespace
              value: "{{ .CommonLabels.namespace }}"

  inhibitRules:
    - sourceMatchers:
        - name: severity
          value: critical
      targetMatchers:
        - name: severity
          value: warning
      equal: [alertname, service, namespace]

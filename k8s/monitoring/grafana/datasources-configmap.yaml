apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: 30s
          exemplarTraceIdDestinations:
            - datasourceUid: tempo
              name: traceID

      - name: Loki
        type: loki
        uid: loki
        url: http://loki:3100
        access: proxy
        jsonData:
          derivedFields:
            - matcherRegex: '"correlation_id":"([^"]+)"'
              name: CorrelationID
              url: '$${__value.raw}'
              datasourceUid: tempo

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo:3200
        access: proxy
        jsonData:
          tracesToLogs:
            datasourceUid: loki
            tags: [service, correlation_id]
          serviceMap:
            datasourceUid: prometheus
          search:
            hide: false
          nodeGraph:
            enabled: true

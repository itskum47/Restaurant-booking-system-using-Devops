version: '3.9'

networks:
  restaurant-network:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: restaurant-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  mongodb:
    image: mongo:6.0
    container_name: restaurant-mongodb
    command: mongod --noauth
    volumes:
      - mongo-data:/data/db
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    container_name: restaurant-redis
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: restaurant-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - JWT_SECRET=${JWT_SECRET}
      - AI_SERVICE_URL=http://ai-service:8001
      - RESTAURANT_SERVICE_URL=http://restaurant-service:3001
      - BOOKING_SERVICE_URL=http://booking-service:8002
      - NVIDIA_API_KEY=${VITE_OPENAI_API_KEY}
      - NVIDIA_API_URL=${VITE_OPENAI_API_URL}
      - NVIDIA_MODEL=${VITE_OPENAI_MODEL}
      - FOURSQUARE_API_KEY=${FOURSQUARE_API_KEY}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - restaurant-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: restaurant-ai-service
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - RESTAURANT_SERVICE_URL=http://restaurant-service:3001
      - AI_SERVICE_PORT=8001
      - AI_MAX_TOKENS=500
      - AI_TEMPERATURE=0.7
    networks:
      - restaurant-network
    restart: unless-stopped

  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: Dockerfile
    container_name: restaurant-restaurant-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=restaurant_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - RESTAURANT_SERVICE_PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - restaurant-network
    restart: unless-stopped

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: restaurant-booking-service
    ports:
      - "8002:8002"
    environment:
      - MONGO_URL=${MONGO_URL}
      - MONGO_DB=${MONGO_DB}
      - REDIS_URL=redis://redis:6379
      - BOOKING_SERVICE_PORT=8002
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification-service:3003
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - restaurant-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: restaurant-notification-service
    ports:
      - "3003:3003"
    environment:
      - REDIS_URL=redis://redis:6379
      - NOTIFICATION_SERVICE_PORT=3003
      - NOTIFICATION_EMAIL_FROM=noreply@restaurant-booking.com
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - restaurant-network
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        - VITE_OPENAI_API_URL=${VITE_OPENAI_API_URL}
        - VITE_OPENAI_MODEL=${VITE_OPENAI_MODEL}
    container_name: restaurant-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - restaurant-network
    restart: unless-stopped

name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/restaurant-booking
  COSIGN_EXPERIMENTAL: "1"

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  quality-and-policy:
    name: Quality, Helm, Kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tooling
        run: pip install flake8 black isort

      - name: Lint Python services
        run: |
          for svc in ai-service booking-service; do
            flake8 services/$svc/app --max-line-length=120 --extend-ignore=E203,W503
            black --check services/$svc/app --line-length 120
          done

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Lint Node services
        run: |
          for svc in api-gateway restaurant-service notification-service; do
            cd services/$svc
            npm ci
            npm run lint || echo "lint script not found for $svc"
            cd ../../
          done

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint + render validation
        run: |
          helm lint helm/restaurant-booking
          helm template restaurant-booking helm/restaurant-booking \
            -f helm/restaurant-booking/values.yaml \
            -f helm/restaurant-booking/values-staging.yaml >/tmp/rendered-staging.yaml
          helm template restaurant-booking helm/restaurant-booking \
            -f helm/restaurant-booking/values.yaml \
            -f helm/restaurant-booking/values-prod.yaml >/tmp/rendered-prod.yaml

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar -xz
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Kubeconform validation
        run: |
          kubeconform -strict -ignore-missing-schemas /tmp/rendered-staging.yaml
          kubeconform -strict -ignore-missing-schemas /tmp/rendered-prod.yaml

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test booking-service
        working-directory: services/booking-service
        env:
          STRIPE_SECRET_KEY: test_key
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov
          pytest tests/ -v --cov=app --cov-fail-under=80

      - name: Test ai-service
        working-directory: services/ai-service
        env:
          GEMINI_API_KEY: test_key
          GROQ_API_KEY: test_key
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov
          pytest tests/ -v --cov=app --cov-fail-under=80

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Test api-gateway
        working-directory: services/api-gateway
        env:
          JWT_SECRET: test-secret-key
        run: |
          npm ci
          npm test -- --coverage --coverageThreshold='{"global":{"lines":70}}'

  build-and-scan:
    name: Build, SBOM, Scan, Sign
    runs-on: ubuntu-latest
    needs: [quality-and-policy, test]
    strategy:
      matrix:
        service: [api-gateway, ai-service, restaurant-service, booking-service, notification-service, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX)
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            -o spdx-json=sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

      - name: Trivy image scan (gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign image with keyless Sigstore
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  deploy-staging:
    name: Deploy Staging + Canary Verification
    runs-on: ubuntu-latest
    needs: [build-and-scan]
    environment:
      name: staging
      url: https://staging.restaurant-booking.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubectl (staging)
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_STAGING }}

      - name: Deploy baseline to staging
        run: |
          helm template restaurant-booking ./helm/restaurant-booking \
            --values helm/restaurant-booking/values.yaml \
            --values helm/restaurant-booking/values-staging.yaml | grep -q "name: db-migration"

          helm upgrade --install restaurant-booking ./helm/restaurant-booking \
            --namespace restaurant-system-staging \
            --create-namespace \
            --values helm/restaurant-booking/values.yaml \
            --values helm/restaurant-booking/values-staging.yaml \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }} \
            --atomic --timeout=15m --wait

      - name: Staging smoke test
        run: |
          bash scripts/synthetic-smoke.sh restaurant-system-staging

  deploy-production:
    name: Deploy Production (Progressive + Approval)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production
      url: https://restaurant-booking.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubectl (prod)
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PROD }}

      - name: Progressive rollout step 1 (canary capacity)
        run: |
          helm template restaurant-booking ./helm/restaurant-booking \
            --values helm/restaurant-booking/values.yaml \
            --values helm/restaurant-booking/values-prod.yaml | grep -q "name: db-migration"

          helm upgrade --install restaurant-booking ./helm/restaurant-booking \
            --namespace restaurant-system-prod \
            --create-namespace \
            --values helm/restaurant-booking/values.yaml \
            --values helm/restaurant-booking/values-prod.yaml \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }} \
            --set apiGateway.replicaCount=2 \
            --set bookingService.replicaCount=2 \
            --atomic --timeout=15m --wait

      - name: Canary validation
        run: |
          kubectl -n restaurant-system-prod rollout status deployment/api-gateway --timeout=5m
          kubectl -n restaurant-system-prod rollout status deployment/booking-service --timeout=5m
          bash scripts/synthetic-smoke.sh restaurant-system-prod

      - name: Progressive rollout step 2 (full scale)
        run: |
          helm upgrade restaurant-booking ./helm/restaurant-booking \
            --namespace restaurant-system-prod \
            --values helm/restaurant-booking/values.yaml \
            --values helm/restaurant-booking/values-prod.yaml \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }} \
            --atomic --timeout=15m --wait

      - name: Verify production rollout
        run: kubectl -n restaurant-system-prod rollout status deployment --timeout=5m

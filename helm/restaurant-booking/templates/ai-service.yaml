{{- if .Values.aiService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.aiService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.aiService.name }}
    version: {{ .Values.aiService.image.tag | quote }}
spec:
  replicas: {{ .Values.aiService.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.aiService.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Values.aiService.name }}
        version: {{ .Values.aiService.image.tag | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.aiService.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: {{ .Values.aiService.name }}
        image: "{{ .Values.aiService.image.repository }}:{{ .Values.aiService.image.tag }}"
        imagePullPolicy: {{ .Values.aiService.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.aiService.service.port }}
          name: http
        resources:
          {{- toYaml .Values.aiService.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.aiService.service.port }}
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.aiService.service.port }}
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: AI_SERVICE_PORT
          value: "{{ .Values.aiService.service.port }}"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: restaurant-secrets
              key: GEMINI_API_KEY
        - name: GEMINI_MODEL
          value: "{{ .Values.aiService.env.GEMINI_MODEL | default "gemini-1.5-flash" }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.aiService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.aiService.name }}
spec:
  type: {{ .Values.aiService.service.type }}
  selector:
    app: {{ .Values.aiService.name }}
  ports:
  - port: {{ .Values.aiService.service.port }}
    targetPort: {{ .Values.aiService.service.port }}
    name: http
---
{{- if .Values.aiService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.aiService.name }}-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.aiService.name }}
  minReplicas: {{ .Values.aiService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.aiService.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.aiService.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.aiService.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
{{- end }}

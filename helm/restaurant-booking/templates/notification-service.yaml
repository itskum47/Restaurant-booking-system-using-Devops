{{- if .Values.notificationService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.notificationService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.notificationService.name }}
    version: {{ .Values.notificationService.image.tag | quote }}
spec:
  replicas: {{ .Values.notificationService.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.notificationService.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Values.notificationService.name }}
        version: {{ .Values.notificationService.image.tag | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.notificationService.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: {{ .Values.notificationService.name }}
        image: "{{ .Values.notificationService.image.repository }}:{{ .Values.notificationService.image.tag }}"
        imagePullPolicy: {{ .Values.notificationService.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: {{ .Values.notificationService.service.port }}
          name: http
        resources:
          {{- toYaml .Values.notificationService.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.notificationService.service.port }}
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.notificationService.service.port }}
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: NOTIFICATION_SERVICE_PORT
          value: "{{ .Values.notificationService.service.port }}"
        - name: REDIS_URL
          value: {{ include "restaurant-booking.redisUrl" . | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.notificationService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.notificationService.name }}
spec:
  type: {{ .Values.notificationService.service.type }}
  selector:
    app: {{ .Values.notificationService.name }}
  ports:
  - port: {{ .Values.notificationService.service.port }}
    targetPort: {{ .Values.notificationService.service.port }}
    name: http
---
{{- if .Values.notificationService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.notificationService.name }}-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.notificationService.name }}
  minReplicas: {{ .Values.notificationService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.notificationService.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.notificationService.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.notificationService.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
{{- end }}

apiVersion: v2
name: restaurant-booking-system
description: AI-Powered Restaurant Booking System Helm Chart
version: 1.0.0
appVersion: "1.0.0"
type: application
icon: https://example.com/icon.png

keywords:
  - restaurant
  - booking
  - ai
  - microservices

maintainers:
  - name: DevOps Team
    email: devops@restaurant-booking.com

dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: mongodb
    version: "13.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
  - name: redis
    version: "17.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

# Development environment values

postgresql:
  primary:
    persistence:
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

mongodb:
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  master:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

apiGateway:
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 3

aiService:
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 3

restaurantService:
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 3

bookingService:
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 3

notificationService:
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 2

frontend:
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 3
